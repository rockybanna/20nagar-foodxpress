<!DOCTYPE html>
<html>
<head>
<title>FoodXpress Customer</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
</head>

<body>

<div class="header">FoodXpress Customer</div>

<div class="page">

<h3>Restaurants</h3>
<div id="restaurant-list"></div>

<h3>Menu</h3>
<div id="menu-list"></div>

<h3>Cart</h3>
<div id="cart-list"></div>
<button class="button" onclick="placeOrder()">Place Order</button>

<h3>Your Orders</h3>
<div id="orders-list"></div>

</div>

<script>

let activeUser=null
let currentRestaurant=null
let cart=[]

// ---------------- INIT ----------------

async function init(){

const {data}=await supabaseClient.auth.getSession()

if(!data.session){
window.location.href="../"
return
}

activeUser=data.session.user

await loadRestaurants()
await loadOrders()

}

// ---------------- RESTAURANTS ----------------

async function loadRestaurants(){

const {data,error}=await supabaseClient
.from("restaurants")
.select("id,name")
.eq("is_online",true)
.order("name")

const container=document.getElementById("restaurant-list")
container.innerHTML=""

if(error){
container.innerText=error.message
return
}

data.forEach(r=>{

const div=document.createElement("div")
div.className="list-item"

div.innerHTML=`
<b>${r.name}</b>
<button class="button">View Menu</button>
`

div.querySelector("button").onclick=()=>{
loadMenu(r)
}

container.appendChild(div)

})

}

// ---------------- MENU ----------------

async function loadMenu(restaurant){

currentRestaurant=restaurant

const {data,error}=await supabaseClient
.from("restaurant_full_menu")
.select("*")
.eq("restaurant_id",restaurant.id)

const container=document.getElementById("menu-list")
container.innerHTML=""

if(error){
container.innerText=error.message
return
}

data.forEach(item=>{

const div=document.createElement("div")
div.className="list-item"

div.innerHTML=`
<b>${item.item_name}</b>
<span>₹${item.price}</span>
<button class="button">Add</button>
`

div.querySelector("button").onclick=()=>{
addToCart(item)
}

container.appendChild(div)

})

}

// ---------------- CART ----------------

function addToCart(item){

const found=cart.find(i=>i.item_id===item.item_id)

if(found){
found.qty++
}else{
cart.push({
item_id:item.item_id,
name:item.item_name,
price:item.price,
qty:1
})
}

renderCart()

}

function renderCart(){

const container=document.getElementById("cart-list")
container.innerHTML=""

cart.forEach((i,index)=>{

const div=document.createElement("div")

div.innerHTML=`
${i.name} x${i.qty} ₹${i.price*i.qty}
<button onclick="removeCart(${index})">Remove</button>
`

container.appendChild(div)

})

}

function removeCart(index){
cart.splice(index,1)
renderCart()
}

// ---------------- ORDER ----------------

async function placeOrder(){

if(cart.length===0){
alert("Cart empty")
return
}

const total=cart.reduce((sum,i)=>sum+(i.price*i.qty),0)

const {data:order,error}=await supabaseClient
.from("orders")
.insert({
customer_id:activeUser.id,
restaurant_id:currentRestaurant.id,
status:"pending_verification",
total_amount:total
})
.select("id")
.single()

if(error){
alert(error.message)
return
}

const items=cart.map(i=>({
order_id:order.id,
item_id:i.item_id,
quantity:i.qty,
price:i.price
}))

await supabaseClient
.from("order_items")
.insert(items)

cart=[]
renderCart()

alert("Order placed")

await loadOrders()

}

// ---------------- ORDERS ----------------

async function loadOrders(){

const {data,error}=await supabaseClient
.from("orders")
.select("id,status,total_amount,created_at")
.eq("customer_id",activeUser.id)
.order("created_at",{ascending:false})

const container=document.getElementById("orders-list")
container.innerHTML=""

if(error){
container.innerText=error.message
return
}

data.forEach(o=>{

const div=document.createElement("div")
div.className="list-item"

div.innerHTML=`
<b>Order ${o.id}</b>
<span class="badge">${o.status}</span>
₹${o.total_amount}
`

container.appendChild(div)

})

}

init()

</script>

</body>
</html>
