```html
<!DOCTYPE html>
<html>
<head>
<title>Payment Verifier</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
</head>

<body>

<div class="header">Payment Verification</div>

<div class="page">

<div class="row">
<button class="button" onclick="loadPayments()">Refresh</button>
<button class="button secondary" onclick="logout()">Logout</button>
</div>

<h3>Pending Payments</h3>
<div id="payments"></div>

</div>

<script>

let user=null

async function logout(){
await supabaseClient.auth.signOut()
window.location.href="../"
}

// ---------- INIT ----------

async function init(){

const {data}=await supabaseClient.auth.getSession()

if(!data.session){
window.location.href="../"
return
}

user=data.session.user

const {data:profile}=await supabaseClient
.from("users")
.select("role")
.eq("id",user.id)
.single()

if(profile.role!=="payment_verifier"){
alert("Verifier role required")
window.location.href="../"
return
}

await loadPayments()

}

// ---------- LOAD PAYMENTS ----------

async function loadPayments(){

const {data,error}=await supabaseClient
.from("payments")
.select("id,order_id,status,proof_url")
.eq("status","pending_verification")
.order("id",{ascending:false})

const container=document.getElementById("payments")
container.innerHTML=""

if(error){
container.innerText=error.message
return
}

if(!data.length){
container.innerHTML="<p class='small'>No payments waiting</p>"
return
}

data.forEach(p=>{

const div=document.createElement("div")
div.className="list-item"

div.innerHTML=`
<b>Payment ${p.id}</b>
<br>
Order: ${p.order_id}
<br>
${p.proof_url ? `<a href="${p.proof_url}" target="_blank">View Proof</a>` : "No proof uploaded"}
<br><br>
<button class="button">Approve</button>
<button class="button secondary">Reject</button>
`

div.querySelectorAll("button")[0].onclick=()=>{
verify(p.id,p.order_id,"approved")
}

div.querySelectorAll("button")[1].onclick=()=>{
verify(p.id,p.order_id,"rejected")
}

container.appendChild(div)

})

}

// ---------- VERIFY ----------

async function verify(paymentId,orderId,status){

await supabaseClient
.from("payments")
.update({
status,
verified_by:user.id,
verified_at:new Date()
})
.eq("id",paymentId)

if(status==="approved"){

await supabaseClient
.from("orders")
.update({status:"searching_dp"})
.eq("id",orderId)

}else{

await supabaseClient
.from("orders")
.update({status:"cancelled"})
.eq("id",orderId)

}

await loadPayments()

}

init()

</script>

</body>
</html>
