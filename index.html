<!DOCTYPE html>
<html>
<head>
<title>20nagar FoodXpress</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="./css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./js/config.js" defer></script>
</head>
<body>
<div class="header">20nagar FoodXpress</div>
<div class="page">
  <div class="card" style="max-width:460px;margin:20px auto;">
    <h3 class="card-title">Welcome Back</h3>
    <p class="small">Sign in to continue ordering, preparing, delivering, or managing operations.</p>
    <div class="grid">
      <input id="email" placeholder="Email">
      <input id="password" type="password" placeholder="Password">
      <div class="row">
        <button class="button" onclick="login()">Login</button>
        <button class="button ghost" onclick="signup()">Signup</button>
      </div>
    </div>
    <p id="message" class="small"></p>
  </div>
</div>
</body>
</html>
