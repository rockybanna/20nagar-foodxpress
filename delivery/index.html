<!DOCTYPE html>
<html>
<head>
<title>Delivery Partner</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
</head>

<body>

<div class="header">Delivery Partner</div>

<div class="page">

<div class="row">
<button class="button" onclick="refresh()">Refresh</button>
<button class="button secondary" onclick="toggleOnline()" id="online-btn">Go Online</button>
<button class="button ghost" onclick="logout()">Logout</button>
</div>

<h3>Available Orders</h3>
<div id="queue"></div>

<h3>My Active Orders</h3>
<div id="my-orders"></div>

</div>

<script>

let user=null
let dpId=null
let online=false

async function logout(){
await supabaseClient.auth.signOut()
window.location.href="../"
}

// ---------------- INIT ----------------

async function init(){

const {data}=await supabaseClient.auth.getSession()

if(!data.session){
window.location.href="../"
return
}

user=data.session.user

const {data:profile}=await supabaseClient
.from("users")
.select("role")
.eq("id",user.id)
.single()

if(profile.role!=="delivery_partner"){
alert("Only delivery partners allowed")
window.location.href="../"
return
}

dpId=user.id

// ensure dp row exists
const {data:dp}=await supabaseClient
.from("delivery_partners")
.select("id,is_online")
.eq("id",dpId)
.maybeSingle()

if(!dp){
await supabaseClient
.from("delivery_partners")
.insert({id:dpId,name:user.email,is_online:false})
}else{
online=dp.is_online
}

renderOnlineButton()

await refresh()

}

function renderOnlineButton(){
document.getElementById("online-btn").innerText=
online?"Go Offline":"Go Online"
}

// ---------------- ONLINE ----------------

async function toggleOnline(){

online=!online

await supabaseClient
.from("delivery_partners")
.update({is_online:online})
.eq("id",dpId)

renderOnlineButton()

}

// ---------------- QUEUE ----------------

async function loadQueue(){

const {data,error}=await supabaseClient
.from("dp_order_queue")
.select("order_id,created_at")
.eq("status","waiting")
.order("created_at",{ascending:true})

const container=document.getElementById("queue")
container.innerHTML=""

if(error){
container.innerText=error.message
return
}

if(!data.length){
container.innerHTML="<p class='small'>No orders waiting</p>"
return
}

data.forEach(o=>{

const div=document.createElement("div")
div.className="list-item"

div.innerHTML=`
<b>Order ${o.order_id}</b>
<button class="button">Accept</button>
`

div.querySelector("button").onclick=()=>{
acceptOrder(o.order_id)
}

container.appendChild(div)

})

}

// ---------------- ACCEPT ----------------

async function acceptOrder(orderId){

if(!online){
alert("Go online first")
return
}

const {data,error}=await supabaseClient.rpc(
"dp_accept_order",
{
p_order_id:orderId,
p_dp_id:dpId
}
)

if(error){
alert(error.message)
return
}

if(data===false){
alert("Another DP accepted first")
}

await refresh()

}

// ---------------- MY ORDERS ----------------

async function loadMyOrders(){

const {data,error}=await supabaseClient
.from("orders")
.select("id,status,total_amount")
.eq("dp_id",dpId)
.in("status",["accepted","picked_up"])

const container=document.getElementById("my-orders")
container.innerHTML=""

if(error){
container.innerText=error.message
return
}

if(!data.length){
container.innerHTML="<p class='small'>No active deliveries</p>"
return
}

data.forEach(o=>{

const div=document.createElement("div")
div.className="list-item"

div.innerHTML=`
<b>Order ${o.id}</b>
<span class="badge">${o.status}</span>
<button class="button">Picked Up</button>
<button class="button secondary">Delivered</button>
`

div.querySelectorAll("button")[0].onclick=()=>{
pickup(o.id)
}

div.querySelectorAll("button")[1].onclick=()=>{
deliver(o.id)
}

container.appendChild(div)

})

}

// ---------------- PICKUP ----------------

async function pickup(orderId){

await supabaseClient
.from("orders")
.update({status:"picked_up"})
.eq("id",orderId)
.eq("dp_id",dpId)

await supabaseClient
.from("delivery_logs")
.insert({
order_id:orderId,
dp_id:dpId,
picked_up_at:new Date()
})

await refresh()

}

// ---------------- DELIVER ----------------

async function deliver(orderId){

await supabaseClient
.from("orders")
.update({status:"delivered"})
.eq("id",orderId)
.eq("dp_id",dpId)

await supabaseClient
.from("delivery_logs")
.insert({
order_id:orderId,
dp_id:dpId,
delivered_at:new Date()
})

await refresh()

}

// ---------------- REFRESH ----------------

async function refresh(){
await loadQueue()
await loadMyOrders()
}

init()

</script>

</body>
</html>
```
