<!DOCTYPE html>
<html>
<head>
  <title>Delivery Partner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
</head>
<body>
<div class="header">Delivery Partner App</div>
<div class="page">
  <div class="card">
    <div class="row">
      <button class="button" onclick="refreshDeliveryData()">Refresh</button>
      <button class="button secondary" onclick="toggleAvailability()" id="availability-btn">Go Online</button>
      <button class="button secondary" onclick="logout()">Logout</button>
    </div>
    <p id="dp-msg" class="small"></p>
  </div>

  <div class="card">
    <h3>Orders Ready for Pickup</h3>
    <div id="ready-orders"></div>
  </div>

  <div class="card">
    <h3>My Active Orders</h3>
    <div id="my-orders"></div>
  </div>
</div>

<script>
let dpUser = null;
let dpId = null;
let online = false;

function setMsg(text){
  document.getElementById("dp-msg").innerText = text;
}

async function logout(){
  await supabaseClient.auth.signOut();
  window.location.href = "../";
}

async function requireDp(){
  const { data } = await supabaseClient.auth.getSession();
  if(!data.session){
    window.location.href = "../";
    return false;
  }

  dpUser = data.session.user;

  const { data: profile, error } = await supabaseClient
    .from("users")
    .select("role")
    .eq("id", dpUser.id)
    .single();

  if(error || profile.role !== "delivery_partner"){
    alert("Only delivery partner role allowed.");
    window.location.href = "../";
    return false;
  }

  const { data: dp, error: dpError } = await supabaseClient
    .from("delivery_partners")
    .select("id,status")
    .eq("id", dpUser.id)
    .maybeSingle();

  if(dpError){
    setMsg(dpError.message);
  }

  dpId = dp?.id || dpUser.id;
  online = dp?.status === "online";
  renderAvailability();
  return true;
}

function renderAvailability(){
  const btn = document.getElementById("availability-btn");
  btn.innerText = online ? "Go Offline" : "Go Online";
}

async function toggleAvailability(){
  online = !online;

  const { error } = await supabaseClient
    .from("delivery_partners")
    .upsert({ id: dpId, status: online ? "online" : "offline" });

  if(error){
    alert(error.message);
    online = !online;
  }

  renderAvailability();
}

async function loadReadyOrders(){
  const { data, error } = await supabaseClient
    .from("orders")
    .select("id,final_total,status,dp_id")
    .eq("status", "ready_for_pickup")
    .is("dp_id", null)
    .limit(20);

  const container = document.getElementById("ready-orders");
  container.innerHTML = "";

  if(error){
    container.innerHTML = `<p class='small'>${error.message}</p>`;
    return;
  }

  if(!data.length){
    container.innerHTML = "<p class='small'>No ready orders available.</p>";
    return;
  }

  data.forEach((order) => {
    const div = document.createElement("div");
    div.className = "list-item";
    div.innerHTML = `
      <b>Order ${order.id}</b><br>
      <span class='small'>Total: ₹${Number(order.final_total).toFixed(2)}</span><br>
      <button class='button' onclick="acceptOrder('${order.id}')">Accept Delivery</button>
    `;
    container.appendChild(div);
  });
}

async function loadMyOrders(){
  const { data, error } = await supabaseClient
    .from("orders")
    .select("id,status,final_total")
    .eq("dp_id", dpId)
    .in("status", ["picked_up", "ready_for_pickup"])
    .order("id", { ascending: false });

  const container = document.getElementById("my-orders");
  container.innerHTML = "";

  if(error){
    container.innerHTML = `<p class='small'>${error.message}</p>`;
    return;
  }

  if(!data.length){
    container.innerHTML = "<p class='small'>No active deliveries.</p>";
    return;
  }

  data.forEach((order) => {
    const div = document.createElement("div");
    div.className = "list-item";
    div.innerHTML = `
      <b>Order ${order.id}</b><br>
      <span class='badge status-${order.status}'>${order.status}</span><br>
      <button class='button' onclick="pickupOrder('${order.id}')" ${order.status !== "ready_for_pickup" ? "disabled" : ""}>Mark Picked Up</button>
      <button class='button' onclick="deliverOrder('${order.id}')" ${order.status !== "picked_up" ? "disabled" : ""}>Mark Delivered</button>
    `;
    container.appendChild(div);
  });
}

async function acceptOrder(orderId){
  const { count } = await supabaseClient
    .from("orders")
    .select("id", { count: "exact", head: true })
    .eq("dp_id", dpId)
    .in("status", ["ready_for_pickup", "picked_up"]);

  if((count || 0) >= 2){
    alert("Max 2 active orders allowed.");
    return;
  }

  const { error } = await supabaseClient
    .from("orders")
    .update({ dp_id: dpId })
    .eq("id", orderId)
    .eq("status", "ready_for_pickup")
    .is("dp_id", null);

  if(error){
    alert(error.message);
    return;
  }

  await refreshDeliveryData();
}

async function pickupOrder(orderId){
  const { error } = await supabaseClient
    .from("orders")
    .update({ status: "picked_up" })
    .eq("id", orderId)
    .eq("dp_id", dpId);

  if(error){
    alert(error.message);
    return;
  }

  await supabaseClient.from("delivery_logs").insert({
    order_id: orderId,
    dp_id: dpId,
    status: "picked_up"
  });

  await refreshDeliveryData();
}

async function deliverOrder(orderId){
  const { error } = await supabaseClient
    .from("orders")
    .update({ status: "delivered" })
    .eq("id", orderId)
    .eq("dp_id", dpId);

  if(error){
    alert(error.message);
    return;
  }

  await supabaseClient.from("delivery_logs").insert({
    order_id: orderId,
    dp_id: dpId,
    status: "delivered"
  });

  await refreshDeliveryData();
}

async function refreshDeliveryData(){
  setMsg("Refreshing delivery data...");
  await loadReadyOrders();
  await loadMyOrders();
  setMsg("Delivery data loaded.");
}

(async function init(){
  const ok = await requireDp();
  if(!ok){ return; }
  await refreshDeliveryData();
})();
</script>
</body>
</html>
