<!DOCTYPE html>
<html>
<head>
<title>Restaurant Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
</head>

<body>

<div class="header">Restaurant Dashboard</div>

<div class="page">

<div class="row">
<button class="button" onclick="refresh()">Refresh</button>
<button class="button secondary" onclick="toggleRestaurant()" id="toggle-btn">Close</button>
<button class="button ghost" onclick="logout()">Logout</button>
</div>

<h3>Incoming Orders</h3>
<div id="orders"></div>

<h3>Menu Items</h3>
<div class="row">
<input id="name" placeholder="Item name">
<input id="price" placeholder="Price">
<button class="button" onclick="addMenu()">Add</button>
</div>

<div id="menu"></div>

</div>

<script>

let user=null
let restaurantId=null
let open=true

async function logout(){
await supabaseClient.auth.signOut()
window.location.href="../"
}

// ---------------- INIT ----------------

async function init(){

const {data}=await supabaseClient.auth.getSession()

if(!data.session){
window.location.href="../"
return
}

user=data.session.user

const {data:profile}=await supabaseClient
.from("users")
.select("role")
.eq("id",user.id)
.single()

if(profile.role!=="restaurant"){
alert("Restaurant role required")
window.location.href="../"
return
}

restaurantId=user.id

// ensure restaurant exists
const {data:r}=await supabaseClient
.from("restaurants")
.select("id,is_online")
.eq("id",restaurantId)
.maybeSingle()

if(!r){
await supabaseClient
.from("restaurants")
.insert({
id:restaurantId,
name:user.email,
is_online:true
})
}else{
open=r.is_online
}

renderButton()

await refresh()

}

function renderButton(){
document.getElementById("toggle-btn").innerText=
open?"Close":"Open"
}

// ---------------- RESTAURANT STATUS ----------------

async function toggleRestaurant(){

open=!open

await supabaseClient
.from("restaurants")
.update({is_online:open})
.eq("id",restaurantId)

renderButton()

}

// ---------------- ORDERS ----------------

async function loadOrders(){

const {data,error}=await supabaseClient
.from("orders")
.select("id,status,total_amount,created_at")
.eq("restaurant_id",restaurantId)
.order("created_at",{ascending:false})

const container=document.getElementById("orders")
container.innerHTML=""

if(error){
container.innerText=error.message
return
}

const active=data.filter(o=>!["delivered","cancelled"].includes(o.status))

if(!active.length){
container.innerHTML="<p class='small'>No orders</p>"
return
}

active.forEach(o=>{

const div=document.createElement("div")
div.className="list-item"

div.innerHTML=`
<b>Order ${o.id}</b>
<span class="badge">${o.status}</span>
₹${o.total_amount}
<button class="button">Preparing</button>
<button class="button secondary">Ready</button>
`

div.querySelectorAll("button")[0].onclick=()=>{
setStatus(o.id,"preparing")
}

div.querySelectorAll("button")[1].onclick=()=>{
setStatus(o.id,"accepted")
}

container.appendChild(div)

})

}

async function setStatus(orderId,status){

await supabaseClient
.from("orders")
.update({status})
.eq("id",orderId)
.eq("restaurant_id",restaurantId)

await refresh()

}

// ---------------- MENU ----------------

async function loadMenu(){

const {data,error}=await supabaseClient
.from("menu_items")
.select("id,name,price")
.eq("restaurant_id",restaurantId)
.order("name")

const container=document.getElementById("menu")
container.innerHTML=""

if(error){
container.innerText=error.message
return
}

data.forEach(i=>{

const div=document.createElement("div")
div.className="list-item"

div.innerHTML=`
<b>${i.name}</b>
₹${i.price}
<button onclick="removeItem('${i.id}')">Delete</button>
`

container.appendChild(div)

})

}

async function addMenu(){

const name=document.getElementById("name").value
const price=document.getElementById("price").value

await supabaseClient
.from("menu_items")
.insert({
restaurant_id:restaurantId,
name,
price
})

document.getElementById("name").value=""
document.getElementById("price").value=""

await loadMenu()

}

async function removeItem(id){

await supabaseClient
.from("menu_items")
.delete()
.eq("id",id)
.eq("restaurant_id",restaurantId)

await loadMenu()

}

// ---------------- REFRESH ----------------

async function refresh(){
await loadOrders()
await loadMenu()
}

init()

</script>

</body>
</html>
