<!DOCTYPE html>
<html>
<head>
  <title>Restaurant Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
</head>
<body>
<div class="header">Restaurant Dashboard</div>
<div class="page grid">
  <div class="card">
    <div class="row">
      <button class="button" onclick="loadOrders()">Refresh Orders</button>
      <button class="button secondary" id="rest-online-btn" onclick="toggleRestaurantStatus()">Go Online</button>
      <button class="button secondary" onclick="logout()">Logout</button>
    </div>
    <p id="rest-msg" class="small"></p>
  </div>
  <div id="rest-metrics" class="dashboard-grid"></div>
  <div class="grid cols-2">
    <div class="card"><h3 class="card-title">Live Kitchen Queue</h3><div id="orders-list"></div></div>
    <div class="card"><h3 class="card-title">Accounting Clean</h3><div id="accounting-list"></div></div>
  </div>
</div>

<script>
let restaurantUser = null;
let restaurantId = null;
let isOnline = false;
function msg(text){ document.getElementById("rest-msg").innerText = text; }
async function logout(){ await supabaseClient.auth.signOut(); window.location.href = "../"; }

async function requireRestaurant(){
  const { data } = await supabaseClient.auth.getSession();
  if(!data.session){ window.location.href = "../"; return false; }
  restaurantUser = data.session.user;
  const { data: profile, error } = await supabaseClient.from("users").select("role,email").eq("id", restaurantUser.id).single();
  if(error || profile.role !== "restaurant"){ alert("Only restaurant role allowed."); window.location.href = "../"; return false; }

  const { data: restaurant } = await supabaseClient.from("restaurants").select("id,is_online,name").eq("id", restaurantUser.id).maybeSingle();
  if(!restaurant){
    await supabaseClient.from("restaurants").insert({ id: restaurantUser.id, name: profile.email || "Restaurant", is_online: false });
    restaurantId = restaurantUser.id;
    isOnline = false;
  } else {
    restaurantId = restaurant.id;
    isOnline = !!restaurant.is_online;
  }
  renderOnlineButton();
  return true;
}

function renderOnlineButton(){ document.getElementById("rest-online-btn").innerText = isOnline ? "Go Offline" : "Go Online"; }

async function toggleRestaurantStatus(){
  isOnline = !isOnline;
  const { error } = await supabaseClient.from("restaurants").update({ is_online: isOnline }).eq("id", restaurantId);
  if(error){ isOnline = !isOnline; alert(error.message); }
  renderOnlineButton();
}

function nextStatusActions(order){
  if(order.status === "pending") return `<button class='button' onclick="updateOrderStatus('${order.id}','accepted')">Accept</button> <button class='button secondary' onclick="updateOrderStatus('${order.id}','cancelled')">Reject</button>`;
  if(order.status === "accepted") return `<button class='button' onclick="updateOrderStatus('${order.id}','preparing')">Start Preparing</button>`;
  if(order.status === "preparing") return `<button class='button' onclick="updateOrderStatus('${order.id}','ready_for_pickup')">Mark Ready</button>`;
  return "";
}

function renderMetrics(orders){
  const pending = orders.filter((o) => o.status === "pending").length;
  const preparing = orders.filter((o) => ["accepted", "preparing"].includes(o.status)).length;
  const ready = orders.filter((o) => o.status === "ready_for_pickup").length;
  document.getElementById("rest-metrics").innerHTML = `<div class='metric'><h4>Pending Orders</h4><p>${pending}</p></div><div class='metric'><h4>In Kitchen</h4><p>${preparing}</p></div><div class='metric'><h4>Ready for Pickup</h4><p>${ready}</p></div>`;
}

async function loadOrders(){
  msg("Loading orders...");
  const { data, error } = await supabaseClient.from("orders").select("id,status,total_amount,distance_km,created_at,customer_id,payments(status)").eq("restaurant_id", restaurantId).order("created_at", { ascending: false }).limit(60);
  const container = document.getElementById("orders-list");
  container.innerHTML = "";
  if(error){ msg(error.message); return; }

  const active = (data || []).filter((o) => ["pending", "accepted", "preparing", "ready_for_pickup"].includes(o.status));
  renderMetrics(active);
  if(!active.length){ container.innerHTML = "<p class='small'>No active orders.</p>"; }
  active.forEach((order) => {
    const payment = (order.payments || [])[0]?.status || "pending";
    const div = document.createElement("div");
    div.className = "list-item";
    div.innerHTML = `<b>Order ${order.id}</b> <span class='badge status-${order.status}'>${order.status}</span><br><span class='small'>Total: ₹${Number(order.total_amount).toFixed(2)} • Payment: ${payment}</span><br><div class='row' style='margin-top:8px'>${nextStatusActions(order)}</div>`;
    container.appendChild(div);
  });
  await loadAccounting(data || []);
  msg("Orders loaded");
}

async function loadAccounting(allOrders){
  const delivered = allOrders.filter((o) => o.status === "delivered");
  const gross = delivered.reduce((s, o) => s + Number(o.total_amount || 0), 0);
  const commission = gross * 0.2;
  const payout = gross - commission;
  const container = document.getElementById("accounting-list");
  container.innerHTML = `<div class='list-item'><b>Delivered Orders</b><br><span class='small'>${delivered.length}</span></div><div class='list-item'><b>Gross Sales</b><br><span class='small'>₹${gross.toFixed(2)}</span></div><div class='list-item'><b>Platform Fee (20%)</b><br><span class='small'>₹${commission.toFixed(2)}</span></div><div class='list-item'><b>Estimated Settlement</b><br><span class='small'>₹${payout.toFixed(2)}</span></div>`;

  if(delivered.length){
    const last = delivered[0];
    await supabaseClient.from("restaurant_settlements").upsert({ restaurant_id: restaurantId, order_id: last.id, gross_amount: gross, commission_amount: commission, net_amount: payout, status: "pending" }, { onConflict: "restaurant_id,order_id" });
  }
}

async function updateOrderStatus(orderId, newStatus){
  const { error } = await supabaseClient.from("orders").update({ status: newStatus }).eq("id", orderId).eq("restaurant_id", restaurantId);
  if(error){ alert(error.message); return; }
  await loadOrders();
}

(async function init(){ const ok = await requireRestaurant(); if(!ok) return; await loadOrders(); })();
</script>
</body>
</html>
